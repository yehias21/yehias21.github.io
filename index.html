<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Yahia Shaaban | ML Researcher</title>
    <meta name="description" content="ML researcher working on time-series foundation models, multimodal learning, and dynamical systems. M.Sc. at MBZUAI.">
    <meta name="author" content="Yahia Salaheldin Shaaban">
    <meta name="color-scheme" content="light dark">
    <meta name="theme-color" content="#2563eb">

    <!-- Open Graph -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Yahia Shaaban | ML Researcher">
    <meta property="og:description" content="ML researcher working on time-series foundation models, multimodal learning, and dynamical systems.">
    <meta property="og:url" content="https://yehias21.github.io">
    <meta name="twitter:card" content="summary">

    <!-- Favicon: brain connectome (same image used in navbar avatar) -->
    <link rel="icon" type="image/png" href="/favicon.png">

    <!-- Blog typography: Open Sans (body + headings) and Lora (italic meta /
         captions) — the type pairing from the Clean Blog theme that the blog
         reading view is styled after. -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital@0;1&family=Open+Sans:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400&display=swap" rel="stylesheet">

    <!-- SPA fallback decode: restores the real path after a 404.html bounce
         (single-page-apps-for-github-pages by rafgraph). Must run before the app. -->
    <script type="text/javascript">
      (function (l) {
        if (l.search[1] === '/') {
          var decoded = l.search.slice(1).split('&').map(function (s) {
            return s.replace(/~and~/g, '&');
          }).join('?');
          window.history.replaceState(null, null,
            l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      }(window.location));
    </script>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              // Dark-mode accent palette: monochrome slate (no chromatic accent).
              // Single source of truth — change here to recolor dark mode.
              // Maps 1:1 to Tailwind's slate scale, so every accent-* class
              // becomes a tonal shift of the page bg.
              accent: {
                50:  '#f8fafc',
                100: '#f1f5f9',
                200: '#e2e8f0',
                300: '#cbd5e1',
                400: '#94a3b8',
                500: '#64748b',
                600: '#475569',
                700: '#334155',
                800: '#1e293b',
                900: '#0f172a',
                950: '#020617',
              },
              matrix: {
                black: '#020617',
                white: '#f1f5f9',
                grey:  '#64748b',
              }
            },
            fontFamily: {
              mono: ['ui-monospace', 'SFMono-Regular', 'Menlo', 'Monaco', 'Consolas', "Liberation Mono", "Courier New", 'monospace'],
              sans: ['system-ui', '-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'Roboto', 'Helvetica Neue', 'Arial', 'sans-serif'],
            }
          }
        }
      }
    </script>
    <style>
      /* Custom Scrollbar */
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #f1f5f9;
      }
      ::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #94a3b8;
      }

      /* Dark mode scrollbar */
      .dark ::-webkit-scrollbar-track {
        background: #020617;
      }
      .dark ::-webkit-scrollbar-thumb {
        background: #334155;
      }
      .dark ::-webkit-scrollbar-thumb:hover {
        background: #94a3b8;
      }

      /* Smooth scrolling */
      html {
        scroll-behavior: smooth;
      }

      /* Scrollbar hidden by default, appears (light) on hover. */
      .scroll-on-hover {
        scrollbar-width: none;
        scrollbar-color: transparent transparent;
      }
      .scroll-on-hover::-webkit-scrollbar {
        width: 0;
        height: 0;
        background: transparent;
      }
      .scroll-on-hover:hover,
      .scroll-on-hover:focus-within {
        scrollbar-width: thin;
        scrollbar-color: rgba(148, 163, 184, 0.45) transparent;
      }
      .scroll-on-hover:hover::-webkit-scrollbar,
      .scroll-on-hover:focus-within::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      .scroll-on-hover:hover::-webkit-scrollbar-thumb,
      .scroll-on-hover:focus-within::-webkit-scrollbar-thumb {
        background-color: rgba(148, 163, 184, 0.45);
        border-radius: 999px;
      }
      .scroll-on-hover:hover::-webkit-scrollbar-thumb:hover,
      .scroll-on-hover:focus-within::-webkit-scrollbar-thumb:hover {
        background-color: rgba(100, 116, 139, 0.65);
      }
      .scroll-on-hover:hover::-webkit-scrollbar-track,
      .scroll-on-hover:focus-within::-webkit-scrollbar-track {
        background: transparent;
      }
      /* Dark-mode variant: slightly warmer but still light. */
      .dark .scroll-on-hover:hover,
      .dark .scroll-on-hover:focus-within {
        scrollbar-color: rgba(148, 163, 184, 0.35) transparent;
      }
      .dark .scroll-on-hover:hover::-webkit-scrollbar-thumb,
      .dark .scroll-on-hover:focus-within::-webkit-scrollbar-thumb {
        background-color: rgba(148, 163, 184, 0.35);
      }

      /* Glitch text effect for matrix mode */
      .glitch-text {
        position: relative;
        animation: glitch 2s infinite;
      }

      @keyframes glitch {
        0%, 90%, 100% {
          text-shadow: none;
        }
        92% {
          text-shadow: 2px 0 #cbd5e1, -2px 0 #475569;
        }
        94% {
          text-shadow: -2px 0 #cbd5e1, 2px 0 #475569;
        }
        96% {
          text-shadow: 2px 0 #475569, -2px 0 #cbd5e1;
        }
        98% {
          text-shadow: none;
        }
      }

      /* Cursor blink animation */
      @keyframes blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0; }
      }
      .cursor-blink {
        animation: blink 1s step-end infinite;
      }

      /* Fade in animations */
      @keyframes fadeInUp {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .animate-in {
        animation: fadeInUp 0.5s ease-out forwards;
      }
    </style>
</head>
  <body class="bg-stone-50 text-slate-900 transition-colors duration-300">
    <div id="root"></div>
  <script type="module" src="/src/index.tsx"></script>
</body>
</html>
