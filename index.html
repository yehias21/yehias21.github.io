    <!-- SPA fallback decode: restores the real path after a 404.html bounce
         (single-page-apps-for-github-pages by rafgraph). Must run before the app. -->
    <script type="text/javascript">
      (function (l) {
        if (l.search[1] === '/') {
          var decoded = l.search.slice(1).split('&').map(function (s) {
            return s.replace(/~and~/g, '&');
          }).join('?');
          window.history.replaceState(null, null,
            l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      }(window.location));
    </script>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              // Dark-mode accent palette: monochrome slate (no chromatic accent).
              // Single source of truth — change here to recolor dark mode.
              // Maps 1:1 to Tailwind's slate scale, so every accent-* class
              // becomes a tonal shift of the page bg.
              accent: {
                50:  '#f8fafc',
                100: '#f1f5f9',
                200: '#e2e8f0',

    <style>
      /* Custom Scrollbar */
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #f1f5f9;
      }
      ::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #94a3b8;
      }

      /* Dark mode scrollbar */
      .dark ::-webkit-scrollbar-track {
        background: #020617;
      }
      .dark ::-webkit-scrollbar-thumb {
        background: #334155;
      }
      .dark ::-webkit-scrollbar-thumb:hover {
        background: #94a3b8;
      }

      /* Smooth scrolling */
      html {
        scroll-behavior: smooth;
      }

      /* Scrollbar hidden by default, appears (light) on hover. */
      .scroll-on-hover {
        scrollbar-width: none;
        scrollbar-color: transparent transparent;
      }
      .scroll-on-hover::-webkit-scrollbar {
        width: 0;
        height: 0;
        background: transparent;
      }
      .scroll-on-hover:hover,
      .scroll-on-hover:focus-within {
        scrollbar-width: thin;
        scrollbar-color: rgba(148, 163, 184, 0.45) transparent;
      }
      .scroll-on-hover:hover::-webkit-scrollbar,
      .scroll-on-hover:focus-within::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      .scroll-on-hover:hover::-webkit-scrollbar-thumb,
      .scroll-on-hover:focus-within::-webkit-scrollbar-thumb {
        background-color: rgba(148, 163, 184, 0.45);
        border-radius: 999px;
      }
      .scroll-on-hover:hover::-webkit-scrollbar-thumb:hover,
      .scroll-on-hover:focus-within::-webkit-scrollbar-thumb:hover {
        background-color: rgba(100, 116, 139, 0.65);
      }
      .scroll-on-hover:hover::-webkit-scrollbar-track,
      .scroll-on-hover:focus-within::-webkit-scrollbar-track {
        background: transparent;
      }
      /* Dark-mode variant: slightly warmer but still light. */
      .dark .scroll-on-hover:hover,
      .dark .scroll-on-hover:focus-within {
        scrollbar-color: rgba(148, 163, 184, 0.35) transparent;
      }
      .dark .scroll-on-hover:hover::-webkit-scrollbar-thumb,
      .dark .scroll-on-hover:focus-within::-webkit-scrollbar-thumb {
        background-color: rgba(148, 163, 184, 0.35);
      }

      /* Glitch text effect for matrix mode */
      .glitch-text {
        position: relative;
        animation: glitch 2s infinite;
      }

      @keyframes glitch {
        0%, 90%, 100% {
          text-shadow: none;
        }
        92% {
          text-shadow: 2px 0 #cbd5e1, -2px 0 #475569;
        }
        94% {
          text-shadow: -2px 0 #cbd5e1, 2px 0 #475569;
        }
        96% {
          text-shadow: 2px 0 #475569, -2px 0 #cbd5e1;
        }
        98% {
          text-shadow: none;
        }
      }

      /* Cursor blink animation */
      @keyframes blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0; }
      }
      .cursor-blink {
        animation: blink 1s step-end infinite;
      }

      /* Fade in animations */
      @keyframes fadeInUp {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .animate-in {
        animation: fadeInUp 0.5s ease-out forwards;
      }

      /* Respect users who ask for less motion: neutralize the glitch, fades,
         slide-ins, and any smooth-scroll / transitions site-wide. */
      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          animation-duration: 0.001ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.001ms !important;
          scroll-behavior: auto !important;
        }
        html { scroll-behavior: auto; }
        .glitch-text, .cursor-blink, .animate-in { animation: none !important; }
      }

      /* --- Content-copy deterrent ---------------------------------------
         Makes casual selecting / copying / image-dragging harder. This is a
         deterrent, NOT security: anyone can read the page source or disable
         JS. Regions that SHOULD stay copyable (citation blocks, form fields)
         opt back in with [data-allow-copy]. Toggle the whole thing off by
         removing the `protect` class from <html> (set in src/index or App). */
      html.protect body {
        -webkit-user-select: none;
        -moz-user-select: none;
        -ms-user-select: none;
        user-select: none;
        -webkit-touch-callout: none;
      }
      html.protect [data-allow-copy],
      html.protect [data-allow-copy] *,
      html.protect input,
      html.protect textarea {
        -webkit-user-select: text;
        -moz-user-select: text;
        -ms-user-select: text;
        user-select: text;
        -webkit-touch-callout: default;
      }
      html.protect img {
        -webkit-user-drag: none;
        -khtml-user-drag: none;
        -moz-user-drag: none;
        user-drag: none;
        -webkit-touch-callout: none;
      }
    </style>
